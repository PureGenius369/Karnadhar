<svg viewBox="0 0 1180 810" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Arial, sans-serif">
<title>KARNADHAR system architecture</title>
<desc>Five-tier architecture: real-time data signals feed a multi-agent intelligence layer under an orchestrator, running on a domain engine and knowledge layer, surfacing in a geospatial command center, producing decisions for energy-sector buyers. The grade-aware rerouting optimizer is the defensible wedge.</desc>
<defs>
<marker id="arr" markerWidth="10" markerHeight="10" refX="5" refY="4" orient="auto"><path d="M1.5,1.5 L7,4 L1.5,6.5" fill="none" stroke="#1D9E75" stroke-width="1.6"/></marker>
</defs>
<style>
.title{font-size:30px;font-weight:700;fill:#1D9E75;}
.subtitle{font-size:14px;fill:#6b7280;}
.tag{font-size:12.5px;fill:#6b7280;font-style:italic;}
.mini{font-family:Consolas,monospace;font-size:10px;fill:#6b7280;}
.tierhdr{font-size:12px;font-weight:600;fill:#6b7280;letter-spacing:1.2px;}
.boxt{font-size:13.5px;font-weight:600;fill:#1f2937;}
.boxt-w{font-size:13.5px;font-weight:700;fill:#C0481F;}
.boxs{font-size:10.5px;fill:#6b7280;}
.barT{font-size:13.5px;font-weight:700;fill:#1f2937;letter-spacing:.5px;}
.bars{font-size:10.5px;fill:#6b7280;}
.legend{font-size:11px;fill:#6b7280;}
.chip{font-size:11px;fill:#1f2937;font-weight:500;}
.pill{font-size:11px;font-weight:700;fill:#0F6E56;}
.card{fill:#f9fafb;stroke:#d1d5db;stroke-width:1;}
.tealbar{fill:#e1f5ee;stroke:#1D9E75;stroke-width:1.5;}
.wedge{fill:#fdeee2;stroke:#D85A30;stroke-width:2;}
.flow{stroke:#1D9E75;stroke-width:1.6;}
.tick{stroke:#1D9E75;stroke-width:1.2;stroke-opacity:.5;}
</style>
<rect x="0" y="0" width="1180" height="810" fill="#ffffff"/>

<text class="title" x="40" y="44">KARNADHAR</text>
<text class="subtitle" x="245" y="44">Energy Supply-Chain Resilience &#183; System Architecture</text>
<text class="tag" x="1140" y="34" text-anchor="end">"From 47-day crisis to 47-minute command"</text>
<text class="mini" x="1140" y="52" text-anchor="end">ET AI HACKATHON 2026 &#183; PROBLEM #2</text>

<rect x="40" y="62" width="12" height="12" rx="2" fill="#D85A30"/>
<text class="legend" x="58" y="72">&#9733; Defensible wedge - grade-aware, transit-aware, SPR-coupled rerouting</text>
<rect x="560" y="62" width="12" height="12" rx="2" fill="#1D9E75"/>
<text class="legend" x="578" y="72">Signal to decision flow</text>
<text class="mini" x="1140" y="72" text-anchor="end">REAL public data &#183; no synthetic signals</text>

<text class="tierhdr" x="40" y="104">(1) REAL-TIME DATA SIGNALS</text>
<rect class="card" x="40" y="114" width="200" height="56" rx="8"/><text class="boxt" x="140" y="139" text-anchor="middle">GDELT</text><text class="boxs" x="140" y="156" text-anchor="middle">Global news &amp; events</text>
<rect class="card" x="265" y="114" width="200" height="56" rx="8"/><text class="boxt" x="365" y="139" text-anchor="middle">AIS Stream</text><text class="boxs" x="365" y="156" text-anchor="middle">Live tanker positions</text>
<rect class="card" x="490" y="114" width="200" height="56" rx="8"/><text class="boxt" x="590" y="139" text-anchor="middle">OFAC &#183; OPEC</text><text class="boxs" x="590" y="156" text-anchor="middle">Sanctions &amp; supply cuts</text>
<rect class="card" x="715" y="114" width="200" height="56" rx="8"/><text class="boxt" x="815" y="139" text-anchor="middle">Markets</text><text class="boxs" x="815" y="156" text-anchor="middle">Brent &#183; Dubai &#183; WTI</text>
