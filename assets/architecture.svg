<rect class="card" x="40" y="268" width="165" height="60" rx="8"/><text class="boxt" x="122.5" y="293" text-anchor="middle">Geopolitical Risk</text><text class="boxs" x="122.5" y="310" text-anchor="middle">Disruption probability</text>
<rect class="card" x="227" y="268" width="165" height="60" rx="8"/><text class="boxt" x="309.5" y="293" text-anchor="middle">Maritime / AIS</text><text class="boxs" x="309.5" y="310" text-anchor="middle">Chokepoint flow watch</text>
<rect class="card" x="414" y="268" width="165" height="60" rx="8"/><text class="boxt" x="496.5" y="293" text-anchor="middle">Scenario Cascade</text><text class="boxs" x="496.5" y="310" text-anchor="middle">Economic impact sim</text>
<rect class="wedge" x="601" y="268" width="165" height="60" rx="8"/><text class="boxt-w" x="683.5" y="293" text-anchor="middle">&#9733; Procurement Opt.</text><text class="boxs" x="683.5" y="310" text-anchor="middle">Grade-aware rerouting</text>
<rect class="card" x="788" y="268" width="165" height="60" rx="8"/><text class="boxt" x="870.5" y="293" text-anchor="middle">Reserve Optimizer</text><text class="boxs" x="870.5" y="310" text-anchor="middle">SPR drawdown schedule</text>
<rect class="card" x="975" y="268" width="165" height="60" rx="8"/><text class="boxt" x="1057.5" y="293" text-anchor="middle">Briefing</text><text class="boxs" x="1057.5" y="310" text-anchor="middle">Cited executive memo</text>
<line class="flow" x1="590" y1="330" x2="590" y2="354" marker-end="url(#arr)"/>
<text class="mini" x="600" y="346">agents run on</text>

<text class="tierhdr" x="40" y="376">(3) DOMAIN ENGINE &amp; KNOWLEDGE</text>
<rect class="wedge" x="40" y="386" width="245" height="58" rx="8"/><text class="boxt-w" x="162.5" y="411" text-anchor="middle">&#9733; Grade &amp; Config KB</text><text class="boxs" x="162.5" y="428" text-anchor="middle">Crude assay compatibility</text>
<rect class="card" x="325" y="386" width="245" height="58" rx="8"/><text class="boxt" x="447.5" y="411" text-anchor="middle">Knowledge Graph</text><text class="boxs" x="447.5" y="428" text-anchor="middle">Supplier &#183; route &#183; refinery</text>
<rect class="card" x="610" y="386" width="245" height="58" rx="8"/><text class="boxt" x="732.5" y="411" text-anchor="middle">Glass-box Cascade Model</text><text class="boxs" x="732.5" y="428" text-anchor="middle">Explicit, testable assumptions</text>
<rect class="wedge" x="895" y="386" width="245" height="58" rx="8"/><text class="boxt-w" x="1017.5" y="411" text-anchor="middle">&#9733; LP Optimization Core</text><text class="boxs" x="1017.5" y="428" text-anchor="middle">Feasible reroute solver</text>
<line class="flow" x1="590" y1="446" x2="590" y2="470" marker-end="url(#arr)"/>

<text class="tierhdr" x="40" y="492">(4) COMMAND CENTER</text>
<rect class="tealbar" x="40" y="500" width="1100" height="60" rx="8"/>
<text class="barT" x="64" y="526">COMMAND CENTER</text>
<text class="bars" x="64" y="544">Next.js &#183; Tailwind &#183; MapLibre geospatial war-room</text>
