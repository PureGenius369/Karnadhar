<rect x="880" y="518" width="110" height="24" rx="12" fill="#e1f5ee" stroke="#1D9E75"/><text class="pill" x="935" y="534" text-anchor="middle">Simulate</text>
<rect x="1000" y="518" width="120" height="24" rx="12" fill="#fdeee2" stroke="#D85A30"/><text class="pill" x="1060" y="534" text-anchor="middle" fill="#C0481F">Orchestrate</text>
<line class="flow" x1="590" y1="560" x2="590" y2="584" marker-end="url(#arr)"/>

