<rect class="card" x="40" y="616" width="245" height="56" rx="8"/><text class="boxt" x="162.5" y="640" text-anchor="middle">Disruption Score</text><text class="boxs" x="162.5" y="657" text-anchor="middle">By corridor &amp; supplier</text>
