<rect class="wedge" x="610" y="616" width="245" height="56" rx="8"/><text class="boxt-w" x="732.5" y="640" text-anchor="middle">&#9733; Reroute Plan</text><text class="boxs" x="732.5" y="657" text-anchor="middle">Ranked &amp; feasible</text>
<rect class="card" x="895" y="616" width="245" height="56" rx="8"/><text class="boxt" x="1017.5" y="640" text-anchor="middle">SPR Schedule + Brief</text><text class="boxs" x="1017.5" y="657" text-anchor="middle">Decision-ready memo</text>

